<!DOCTYPE html>
<html>
    <head>
        <title>myCharger</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <meta http-equiv="refresh" content="2"></head>
    <body class="bg-blue text-white p-5">
        <h1> Standard Bank EV Center</h1>
        <div class="row  my-4">
            <div class="col"><h3>Revenue: R{{cost}}</h3></div>
            <div class="col"><h3>Energy:{{energy}} kWh</h3></div>
        </div>
        <table class="table table-light table-striped">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Status</th>
                    <th>Controls</th>
                </tr></thead>
                <tbody>
                    {% for c in chargers %}
                    <tr>
                        <td>{{c.charger_id}}</td>
                        <td>
                            {%if c.status == 'CHARGING'%}<span class="badge bg-warning text-dark">CHARGING</span>
                            {%elif c.status == 'AVAILABLE'%}<span class="badge bg-success">AVAILABLE</span>
                            {%else %}<span class="badge bg-secondary">OFFLINE</span>
                            {%endif%}
                        </td>
                        <td>
                            <a href="/command/{{c.charger_id}}/start" class="btn btn-sm bt-success">Start</a>
                            <a href="/command/{{c.charger_id}}/stop" class="btn btn-sm btn-danger">Stop</a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
        </table>

    </body> 
    </head>

</html>
